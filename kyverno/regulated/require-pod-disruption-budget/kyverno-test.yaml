apiVersion: cli.kyverno.io/v1alpha1
kind: Test
metadata:
  name: require-pod-disruption-budget-test
policies:
  - policy.yaml
resources:
  - resources.yaml
results:
  - policy: require-pod-disruption-budget
    rule: check-pdb-annotation
    resource: deployment-no-pdb-annotation
